name: CI
on: [push, pull_request]

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Cache pre-commit
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-3${{ hashFiles('.pre-commit-config.yaml') }}
      - name: Install environment
        run: uv sync --no-default-groups --group dev
      - name: Run pre-commit
        run: uv run pre-commit run --show-diff-on-failure --color=always --all-files

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
        resolution: ["highest", "lowest-direct"]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Get main commit hash
        id: get-main-hash
        run: echo "main_hash=$(git rev-parse origin/main)" >> $GITHUB_OUTPUT
      - id: testmon-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: .testmondata
          key: testmon-${{ steps.get-main-hash.outputs.main_hash }}-${{ runner.os }}-${{ matrix.python-version }}-${{ matrix.resolution }}
      - id: pytest-testmon
        name: Pytest testmon
        # Run only on non-main branches or PRs
        if: github.ref != 'refs/heads/main' || github.event_name == 'pull_request'
        run: uv run --no-default-groups --group dev -p ${{ matrix.python-version }} --resolution ${{ matrix.resolution }} -U pytest --testmon
        continue-on-error: true
      - name: Full Pytest
        # Run full test suite if testmon failed or on main branch
        if: steps.pytest-testmon.outcome == 'failure' || (github.ref == 'refs/heads/main' && github.event_name != 'pull_request')
        run: rm .testmondata & uv run --no-default-groups --group dev -p ${{ matrix.python-version }} --resolution ${{ matrix.resolution }} -U pytest --testmon
      - id: testmon-cache-save
        uses: actions/cache/save@v4
        if: always() && github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        with:
          path: .testmondata
          key: testmon-${{ steps.get-main-hash.outputs.main_hash }}-${{ runner.os }}-${{ matrix.python-version }}-${{ matrix.resolution }}

  applications:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - { name: "MCMC NVT", config: "kups_mcmc_rigid ci_mcmc_nvt.yaml" }
          - { name: "MCMC µVT", config: "kups_mcmc_rigid ci_mcmc_gcmc.yaml" }
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Run ${{ matrix.app.name }}
        run: uv run --no-default-groups --group dev --env-file ci.env ${{ matrix.app.config }}
        working-directory: ./ci
