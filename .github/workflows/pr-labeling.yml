name: PR Labeling

on:
  pull_request:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  label:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Label PR
        uses: actions/github-script@v7
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          script: |
            const script = require('./.github/scripts/label-pr.js');
            await script({ github, context });

  describe:
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '/describe'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate PR Description
        uses: actions/github-script@v7
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          script: |
            const script = require('./.github/scripts/describe-pr.js');
            const trigger = context.eventName === 'issue_comment' ? 'comment' : 'pr_open';
            await script({ github, context, trigger });
