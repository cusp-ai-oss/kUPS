inp_files:
  - host/MOF1.cif
  - host/MOF2.cif
  - host/MOF3.cif
  - host/MOF4.cif
  - host/MOF5.cif
model_path: mlffs/uma-s-1p2_odac.zip
relax:
  optimizer:
    - transform: scale_by_ase_lbfgs
      memory_size: 100
      alpha: 70
    - transform: max_step_size
      max_step_size: 0.2
    - transform: scale
      step_size: -1
  optimize_cell: false
run:
  out_file: relax_uma_mofs.h5
  max_steps: 2000
  force_tolerance: 0.05   # eV/Å
  seed: null
